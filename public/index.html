<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PV Unit Layout Comparison</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#fff;--bg2:#f7f7f5;--bg3:#f1efe8;
    --text:#1a1a18;--text2:#6b6b68;--text3:#9b9b97;
    --bd:rgba(0,0,0,0.1);--bd2:rgba(0,0,0,0.18);
    --ibg:#e6f1fb;--itx:#185fa5;--ibd:rgba(24,95,165,0.25);
    --okbg:#eaf3de;--oktx:#3b6d11;--okbd:rgba(59,109,17,0.25);
    --warnbg:#faeeda;--warntx:#854f0b;
    --hi:#3b6d11;--lo:#a32d2d;--amber:#EF9F27;
    --r:8px;--rl:12px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#191918;--bg2:#222220;--bg3:#2a2a28;
    --text:#e8e6de;--text2:#9b9b97;--text3:#6b6b68;
    --bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.18);
    --ibg:#0c2f52;--itx:#85b7eb;--ibd:rgba(133,183,235,0.25);
    --okbg:#173404;--oktx:#97c459;--okbd:rgba(151,196,89,0.25);
    --warnbg:#412402;--warntx:#FAC775;
    --hi:#97c459;--lo:#f09595;
  }}

  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:var(--bg);color:var(--text);padding:1.25rem 1rem 3rem;min-height:100vh}

  /* Header */
  .hdr{margin-bottom:1.25rem}
  .hdr h1{font-size:16px;font-weight:600;letter-spacing:-.01em}
  .hdr p{font-size:12px;color:var(--text2);margin-top:3px}

  /* State bar */
  #state-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:.85rem;min-height:20px;max-height:24px;overflow:hidden}
  .spinner{width:14px;height:14px;min-width:14px;border:2px solid var(--bd2);border-top-color:var(--itx);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  #state-bar svg{width:14px;height:14px;min-width:14px;max-width:14px;flex-shrink:0;display:inline-block}
  .last-fetch{font-size:10px;color:var(--text3);margin-left:auto}
  .refresh-btn{font-size:11px;padding:2px 8px;border:0.5px solid var(--bd2);border-radius:var(--r);cursor:pointer;background:transparent;color:var(--text2);transition:opacity .13s}
  .refresh-btn:hover{opacity:.7}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.85rem;align-items:center}
  .toolbar select,.toolbar input{font-size:12px;padding:4px 8px;border:0.5px solid var(--bd2);border-radius:var(--r);background:var(--bg);color:var(--text);height:30px;outline:none}
  .toolbar select:focus,.toolbar input:focus{border-color:var(--itx)}
  #rc{font-size:11px;color:var(--text3);margin-left:auto}

  /* Room toggles */
  .slbl{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:5px;letter-spacing:.04em}
  .tog-groups{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:.85rem}
  .tog-group{display:flex;flex-direction:column;gap:4px}
  .tog-group-lbl{font-size:10px;color:var(--text3);letter-spacing:.04em;font-weight:500;padding-left:2px}
  .tog-row{display:flex;gap:5px;flex-wrap:wrap}
  .tog{font-size:11px;padding:3px 10px;border:0.5px solid var(--bd2);border-radius:20px;cursor:pointer;background:var(--bg2);color:var(--text2);user-select:none;transition:all .14s}
  .tog.on{background:var(--ibg);color:var(--itx);border-color:var(--ibd)}
  .tog.sub{font-size:10px;padding:2px 9px;border-style:dashed;opacity:.8}
  .tog.sub.on{border-style:solid;opacity:1}

  /* Legend */
  .legend{display:flex;gap:14px;font-size:11px;color:var(--text3);margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
  .legend span{display:flex;align-items:center;gap:5px}
  .ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .vp{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--okbg);color:var(--oktx);border:0.5px solid var(--okbd);font-weight:500}

  /* Table */
  .tbl-wrap{overflow-x:auto;border:0.5px solid var(--bd);border-radius:var(--rl)}
  table{width:100%;border-collapse:collapse;font-size:12px}
  thead th{background:var(--bg2);font-weight:500;font-size:11px;color:var(--text2);padding:7px 10px;text-align:left;white-space:nowrap;border-bottom:0.5px solid var(--bd);position:sticky;top:0;z-index:2}
  thead th.frz{position:sticky;left:0;z-index:3;background:var(--bg2);border-right:0.5px solid var(--bd)}
  thead th.sub-th{color:var(--text3);font-weight:400}
  th .sub{display:block;font-weight:400;font-size:10px;opacity:.6;margin-top:1px}
  tbody tr{border-bottom:0.5px solid var(--bd);transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--bg2)}
  tbody td{padding:7px 10px;white-space:nowrap;vertical-align:middle}
  td.frz{position:sticky;left:0;background:var(--bg);z-index:1;border-right:0.5px solid var(--bd);font-weight:500;font-size:12px}
  tbody tr:hover td.frz{background:var(--bg2)}
  td.sub-td{background:rgba(0,0,0,.015)}
  @media(prefers-color-scheme:dark){td.sub-td{background:rgba(255,255,255,.02)}}

  /* Cell pieces */
  .type-wrap{display:flex;flex-direction:column;gap:3px}
  .type-top{display:flex;align-items:center;gap:5px}
  .sqft-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg2);color:var(--text2);border:0.5px solid var(--bd)}
  .dk-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;cursor:help}
  .rb{display:flex;align-items:center;gap:5px;color:var(--text2)}
  .rb b{font-weight:500;color:var(--text);font-size:12px}
  .rb-sep{color:var(--bd2)}
  .dim{color:var(--text3);font-size:11px}
  .dval{font-weight:500;color:var(--text)}
  .dhi{font-weight:500;color:var(--hi)}
  .dlo{font-weight:500;color:var(--lo)}
  .plan-btn{font-size:10px;padding:2px 7px;border:0.5px solid var(--ibd);border-radius:var(--r);cursor:pointer;background:var(--ibg);color:var(--itx);white-space:nowrap;transition:opacity .13s;display:inline-block;margin:2px 2px 0 0}
  .plan-btn:hover{opacity:.72}
  .empty td{padding:28px;text-align:center;color:var(--text3)}

  /* Modal */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bd2);padding:1.25rem;width:92%;max-width:580px;max-height:90vh;overflow-y:auto}
  .modal-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
  .modal-hdr h3{font-size:14px;font-weight:600}
  .modal-meta{font-size:11px;color:var(--text2);margin-top:3px}
  .modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;line-height:1;padding:0;margin-left:8px;flex-shrink:0}
  .tab-group{margin-bottom:.75rem}
  .tab-group-lbl{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:.04em;margin-bottom:5px}
  .tab-row{display:flex;gap:5px;flex-wrap:wrap}
  .area-tab{font-size:11px;padding:3px 10px;border:0.5px solid var(--bd2);border-radius:20px;cursor:pointer;background:transparent;color:var(--text2);transition:all .13s}
  .area-tab.on{background:var(--ibg);color:var(--itx);border-color:var(--ibd)}
  .area-tab.sub-tab{font-size:10px;padding:2px 8px;border-style:dashed}
  .area-tab.sub-tab.on{border-style:solid}
  .fp-box{border:0.5px solid var(--bd);border-radius:var(--r);overflow:hidden;min-height:220px;display:flex;align-items:center;justify-content:center;background:var(--bg2)}
  .fp-box img{width:100%;height:auto;max-height:500px;object-fit:contain;display:block}
  .fp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3);font-size:12px;padding:2rem;text-align:center}
  .fp-empty svg{opacity:.35}
  .fp-area-name{font-size:13px;font-weight:500;color:var(--text2)}
  .fp-hint{font-size:10px;line-height:1.6;max-width:320px}
  .fp-hint a{color:var(--itx)}
</style>
</head>
<body>

<div class="hdr">
  <h1>PV Unit Layout Comparison</h1>
  <p>Dimensions in mm · Areas auto-calculated in sqm · Data live from Notion</p>
</div>

<!-- State bar -->
<div id="state-bar">
  <div class="spinner"></div>
  <span id="state-msg">Loading from Notion…</span>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <select id="fb"><option value="all">All sizes</option><option value="800">800–882 sqft</option><option value="900">900–989 sqft</option><option value="1000">1,000 sqft+</option></select>
  <select id="fr"><option value="all">All room counts</option><option value="2">2 bed</option><option value="3">3 bed</option><option value="4">4 bed</option></select>
  <select id="fs"><option value="all">All statuses</option><option value="Completed">Completed</option><option value="Ongoing">Ongoing</option><option value="Upcoming">Upcoming</option></select>
  <input type="text" id="fq" placeholder="Search project…" style="width:130px">
  <span id="rc"></span>
</div>

<div class="slbl">Room areas</div>
<div class="tog-groups" id="togs"></div>

<div class="legend">
  <span><span class="ldot" style="background:var(--hi)"></span>Above band avg</span>
  <span><span class="ldot" style="background:var(--lo)"></span>Below band avg</span>
  <span><span class="ldot" style="background:var(--amber)"></span>Dual-key</span>
  <span><span class="vp">VP20xx</span>Completed</span>
</div>

<div class="tbl-wrap">
  <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-hdr">
      <div><h3 id="mt"></h3><div class="modal-meta" id="mm"></div></div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div id="modal-tabs"></div>
    <div class="fp-box" id="mfp"></div>
  </div>
</div>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
// In production this points to /api/data (same domain, Vercel serverless).
// During local dev you can override with a full URL if needed.
const API_URL = '/api/data';

// ─── Plan slot builder ─────────────────────────────────────────────────────
// Derives the exact list of plan image slots from bedroom + bathroom count.
// Rule: all beds → each bath with its shower → fixed 4 areas.
function buildPlanSlots(beds, baths) {
  const slots = [];
  for (let i = 1; i <= beds; i++)
    slots.push({ key:`planBed${i}`, label:`Bed ${i}`, isSub:false, group:`Bedroom ${i}` });
  for (let i = 1; i <= baths; i++) {
    slots.push({ key:`planBath${i}`,   label:`Bath ${i}`,   isSub:false, group:`Bathroom ${i}` });
    slots.push({ key:`planShower${i}`, label:`Shower ${i}`, isSub:true,  group:`Bathroom ${i}` });
  }
  slots.push({ key:'planLiving',  label:'Living & Dining', isSub:false, group:'Common areas' });
  slots.push({ key:'planKitchen', label:'Kitchen',         isSub:false, group:'Common areas' });
  slots.push({ key:'planYard',    label:'Yard',            isSub:false, group:'Common areas' });
  slots.push({ key:'planBalcony', label:'Balcony',         isSub:false, group:'Common areas' });
  return slots;
}

// ─── Dimension toggle config ───────────────────────────────────────────────
const DIM_GROUPS = [
  { label:'Master',        keys:['mb','mbath','mbShower'] },
  { label:'Bed / Bath 2',  keys:['bed2','bath2','bath2Shower'] },
  { label:'Bed / Bath 3',  keys:['bed3','bath3','bath3Shower'] },
  { label:'Bed / Bath 4',  keys:['bed4','bath4','bath4Shower'] },
  { label:'Living spaces', keys:['living','dining','kitchen','balcony'] },
];
const DIM_ROOMS = [
  { key:'mb',          label:'Master bed', isSub:false, minBeds:0, minBaths:0 },
  { key:'mbath',       label:'Master bath',isSub:false, minBeds:0, minBaths:0 },
  { key:'mbShower',    label:'↳ Shower 1', isSub:true,  minBeds:0, minBaths:0 },
  { key:'bed2',        label:'Bedroom 2',  isSub:false, minBeds:2, minBaths:0 },
  { key:'bath2',       label:'Bath 2',     isSub:false, minBeds:0, minBaths:2 },
  { key:'bath2Shower', label:'↳ Shower 2', isSub:true,  minBeds:0, minBaths:2 },
  { key:'bed3',        label:'Bedroom 3',  isSub:false, minBeds:3, minBaths:0 },
  { key:'bath3',       label:'Bath 3',     isSub:false, minBeds:0, minBaths:3 },
  { key:'bath3Shower', label:'↳ Shower 3', isSub:true,  minBeds:0, minBaths:3 },
  { key:'bed4',        label:'Bedroom 4',  isSub:false, minBeds:4, minBaths:0 },
  { key:'bath4',       label:'Bath 4',     isSub:false, minBeds:0, minBaths:4 },
  { key:'bath4Shower', label:'↳ Shower 4', isSub:true,  minBeds:0, minBaths:4 },
  { key:'living',      label:'Living',     isSub:false, minBeds:0, minBaths:0 },
  { key:'dining',      label:'Dining',     isSub:false, minBeds:0, minBaths:0 },
  { key:'kitchen',     label:'Kitchen',    isSub:false, minBeds:0, minBaths:0 },
  { key:'balcony',     label:'Balcony',    isSub:false, minBeds:0, minBaths:0 },
];

// ─── State ─────────────────────────────────────────────────────────────────
let DATA = [];
let activeDims = new Set(['mb','mbath','mbShower','bed2','bath2','bath2Shower','bed3','bath3','bath3Shower','bed4','bath4','bath4Shower','living','dining','kitchen','balcony']);
let fBand='all', fRooms='all', fStat='all', fQ='';
let mRow=null, mSlotKey=null;

// ─── Load from API ─────────────────────────────────────────────────────────
async function loadData() {
  setStatus('loading', 'Loading from Notion…');
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`API returned ${res.status}`);
    const json = await res.json();
    DATA = json.data || [];
    const t = new Date(json.fetchedAt);
    const timeStr = t.toLocaleTimeString('en-MY', { hour:'2-digit', minute:'2-digit' });
    setStatus('ok', `${DATA.length} units · updated ${timeStr}`);
    renderToggles();
    renderTable();
  } catch(e) {
    console.error(e);
    setStatus('err', `Could not load — ${e.message}`);
  }
}

function setStatus(type, msg) {
  const bar = document.getElementById('state-bar');
  const icons = {
    loading: '<div class="spinner"></div>',
    ok:  '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="var(--hi)" stroke-width="1.5"/><path d="M4 7l2 2 4-4" stroke="var(--hi)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    err: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="var(--lo)" stroke-width="1.5"/><path d="M7 4v3M7 9.5v.5" stroke="var(--lo)" stroke-width="1.5" stroke-linecap="round"/></svg>',
  };
  const refreshBtn = type !== 'loading'
    ? `<button class="refresh-btn" onclick="loadData()">↻ Refresh</button>` : '';
  bar.innerHTML = `${icons[type]}<span>${msg}</span>${refreshBtn}`;
}

// ─── Helpers ───────────────────────────────────────────────────────────────
const sqm = d => d&&d[0]&&d[1] ? +(d[0]/1000*d[1]/1000).toFixed(2) : null;
const ms  = d => d&&d[0]&&d[1] ? `${(d[0]/1000).toFixed(2)}×${(d[1]/1000).toFixed(2)}` : null;

const avgCache = {};
function avg(band, key) {
  const k = `${band}-${key}`;
  if (!avgCache[k]) {
    const rows = DATA.filter(d => d.band === band);
    const vals = rows.map(d => sqm(d[key]) || 0);
    avgCache[k] = vals.reduce((a,b) => a+b, 0) / (vals.length || 1);
  }
  return avgCache[k];
}

// ─── Toggles ───────────────────────────────────────────────────────────────
function renderToggles() {
  document.getElementById('togs').innerHTML = DIM_GROUPS.map(g => `
    <div class="tog-group">
      <div class="tog-group-lbl">${g.label}</div>
      <div class="tog-row">
        ${g.keys.map(key => {
          const r = DIM_ROOMS.find(r => r.key === key);
          return `<span class="tog${r.isSub?' sub':''} ${activeDims.has(key)?'on':''}" onclick="togDim('${key}')">${r.label}</span>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function togDim(key) {
  const r = DIM_ROOMS.find(r => r.key === key);
  if (activeDims.has(key)) {
    const nonSub = [...activeDims].filter(k => !DIM_ROOMS.find(r => r.key===k).isSub);
    if (nonSub.length <= 1 && !r.isSub) return;
    activeDims.delete(key);
    // when a bath is toggled off, also hide its shower
    if (key === 'mbath')  activeDims.delete('mbShower');
    if (key === 'bath2')  activeDims.delete('bath2Shower');
    if (key === 'bath3')  activeDims.delete('bath3Shower');
    if (key === 'bath4')  activeDims.delete('bath4Shower');
  } else {
    activeDims.add(key);
    // when a shower is toggled on, ensure its parent bath is on too
    if (key === 'mbShower')    activeDims.add('mbath');
    if (key === 'bath2Shower') activeDims.add('bath2');
    if (key === 'bath3Shower') activeDims.add('bath3');
    if (key === 'bath4Shower') activeDims.add('bath4');
  }
  renderToggles(); renderTable();
}

// ─── Table ─────────────────────────────────────────────────────────────────
function renderTable() {
  const rl = DIM_ROOMS.filter(r => activeDims.has(r.key));
  document.getElementById('thead').innerHTML = `<tr>
    <th class="frz">Project</th>
    <th>Type</th>
    <th>Bed&thinsp;/&thinsp;Bath</th>
    ${rl.map(r => `<th class="${r.isSub?'sub-th':''}">${r.label}<span class="sub">L×W · sqm</span></th>`).join('')}
    <th>Plans</th>
  </tr>`;

  const rows = DATA.filter(d => {
    if (fBand  !== 'all' && d.band   !== +fBand)  return false;
    if (fRooms !== 'all' && d.rooms  !== +fRooms) return false;
    if (fStat  !== 'all' && d.status !== fStat)   return false;
    if (fQ && !d.project.toLowerCase().includes(fQ)) return false;
    return true;
  });

  if (!rows.length) {
    document.getElementById('tbody').innerHTML = `<tr class="empty"><td colspan="${rl.length+4}">No results match your filters</td></tr>`;
    document.getElementById('rc').textContent = '0 units';
    return;
  }

  document.getElementById('tbody').innerHTML = rows.map(d => {
    const cells = rl.map(r => {
      if ((r.minBeds > 0 && d.rooms < r.minBeds) || (r.minBaths > 0 && d.baths < r.minBaths))
        return `<td class="${r.isSub?'sub-td':''}"><span class="dim">—</span></td>`;
      const val = d[r.key], s = sqm(val), m = ms(val);
      if (!s) return `<td class="${r.isSub?'sub-td':''}"><span class="dim">—</span></td>`;
      const a = avg(d.band, r.key);
      const cls = s > a*1.08 ? 'dhi' : s < a*0.92 ? 'dlo' : 'dval';
      return `<td class="${r.isSub?'sub-td':''}"><span class="${cls}">${m}</span><br><span class="dim">${s} m²</span></td>`;
    }).join('');

    // Map dim toggle keys to plan slot keys — buttons mirror active area toggles
    const DIM_TO_PLAN = {
      mb:          'planBed1',
      mbath:       'planBath1',
      mbShower:    'planShower1',
      bed2:        'planBed2',
      bath2:       'planBath2',
      bath2Shower: 'planShower2',
      bed3:        'planBed3',
      bath3:       'planBath3',
      bath3Shower: 'planShower3',
      bed4:        'planBed4',
      bath4:       'planBath4',
      bath4Shower: 'planShower4',
      living:      'planLiving',
      dining:      'planLiving',
      kitchen:     'planKitchen',
      balcony:     'planBalcony',
    };
    const allSlots = buildPlanSlots(d.rooms, d.baths);
    // Collect plan slot keys matching active dim toggles
    const activeSlotKeys = new Set(
      [...activeDims].map(k => DIM_TO_PLAN[k]).filter(Boolean)
    );
    // Yard always travels with balcony
    if (activeDims.has('balcony')) activeSlotKeys.add('planYard');

    const btns = allSlots
      .filter(s => activeSlotKeys.has(s.key))
      .map(s => `<button class="plan-btn" onclick="openModal('${d.project}','${d.type}','${s.key}')">${s.label} ↗</button>`)
      .join('');

    return `<tr>
      <td class="frz">
        <div style="display:flex;flex-direction:column;gap:3px">
          <span>${d.project}</span>
          ${d.badge ? `<span class="vp">${d.badge}</span>` : ''}
        </div>
      </td>
      <td>
        <div class="type-wrap">
          <div class="type-top">
            ${d.dualKey ? '<span class="dk-dot" title="Dual-key layout"></span>' : ''}
            <span style="font-weight:500">${d.type}</span>
            <span class="sqft-badge">${d.sqft}</span>
          </div>
        </div>
      </td>
      <td><div class="rb"><b>${d.rooms}</b><span class="dim">bed</span><span class="rb-sep">·</span><b>${d.baths}</b><span class="dim">bath</span></div></td>
      ${cells}
      <td style="min-width:88px">${btns}</td>
    </tr>`;
  }).join('');

  document.getElementById('rc').textContent = `${rows.length} unit${rows.length!==1?'s':''}`;
}

document.getElementById('fb').onchange = e => { fBand  = e.target.value; renderTable(); };
document.getElementById('fr').onchange = e => { fRooms = e.target.value; renderTable(); };
document.getElementById('fs').onchange = e => { fStat  = e.target.value; renderTable(); };
document.getElementById('fq').oninput  = e => { fQ     = e.target.value.toLowerCase(); renderTable(); };

// ─── Modal ─────────────────────────────────────────────────────────────────
function openModal(project, type, slotKey) {
  mRow = DATA.find(d => d.project === project && d.type === type);
  mSlotKey = slotKey;
  document.getElementById('mt').textContent = `${project} — ${type}`;
  document.getElementById('mm').textContent = `${mRow.rooms} bed · ${mRow.baths} bath · select area to view floor plan`;
  renderModalTabs(); renderFp();
  document.getElementById('modal').classList.add('open');
}

function renderModalTabs() {
  const slots = buildPlanSlots(mRow.rooms, mRow.baths);
  const sections = {};
  slots.forEach(s => { (sections[s.group] = sections[s.group] || []).push(s); });
  document.getElementById('modal-tabs').innerHTML = Object.entries(sections).map(([grp, items]) => `
    <div class="tab-group">
      <div class="tab-group-lbl">${grp}</div>
      <div class="tab-row">
        ${items.map(s => `<span class="area-tab${s.isSub?' sub-tab':''} ${s.key===mSlotKey?'on':''}" onclick="switchSlot('${s.key}')">${s.label}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function switchSlot(key) { mSlotKey = key; renderModalTabs(); renderFp(); }

function renderFp() {
  const slots = buildPlanSlots(mRow.rooms, mRow.baths);
  const slot = slots.find(s => s.key === mSlotKey);
  const url = mRow[mSlotKey] || null;
  const fp = document.getElementById('mfp');
  if (url) {
    fp.innerHTML = `<img src="${url}" alt="${slot.label} — ${mRow.project} ${mRow.type}"
      onerror="this.parentElement.innerHTML=emptyFp('${slot.label}','Image failed to load. Check the URL in Notion.')">`;
  } else {
    fp.innerHTML = emptyFp(
      slot ? slot.label : '',
      `Paste a public image URL into <strong>Plan — ${slot ? slot.label : ''}</strong> in the
       <a href="https://www.notion.so/2e685d29c3de4011a02aa9916aaf685d" target="_blank">Notion database</a>
       then click ↻ Refresh above.`
    );
  }
}

function emptyFp(label, hint) {
  return `<div class="fp-empty">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <rect x="4" y="4" width="32" height="32" rx="3" stroke="currentColor" stroke-width="1.5"/>
      <rect x="4" y="4" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1"/>
      <rect x="20" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1"/>
      <rect x="4" y="22" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1"/>
      <rect x="22" y="22" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1"/>
    </svg>
    <span class="fp-area-name">${label} floor plan</span>
    <span class="fp-hint">${hint}</span>
  </div>`;
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ─── Boot ──────────────────────────────────────────────────────────────────
renderToggles();
loadData();
</script>
</body>
</html>
